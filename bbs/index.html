<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲示板</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bbs-header">
    <h1 class="bbs-title">掲示板</h1>
    <div id="auth-area" class="auth-area">
      <button id="login-btn" class="google-btn" style="display:none;">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
      <div id="user-info" class="user-info" style="display:none;">
        <img id="user-avatar" class="user-avatar" src="" alt="">
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="logout-btn">ログアウト</button>
      </div>
    </div>
  </div>

  <div class="bbs-container">

    <div id="login-prompt" class="login-prompt" style="display:none;">
      <p>投稿するにはGoogleアカウントでログインしてください</p>
      <button id="login-btn-2" class="google-btn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
    </div>

    <form id="post-form" class="post-form" style="display:none;">
      <div class="form-user-row">
        <img id="form-avatar" class="user-avatar" src="" alt="">
        <span id="form-name" class="form-name"></span>
      </div>
      <textarea id="message-input" placeholder="メッセージを入力..." maxlength="500" rows="3"></textarea>
      <button type="submit" id="submit-btn">投稿する</button>
    </form>

    <div id="posts-list" class="posts-list">
      <div class="bbs-loading">読み込み中...</div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
  <script src="/common.js"></script>
</body>
</html>

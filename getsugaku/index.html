<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月々の支払い管理</title>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="back-fab" onclick="location.href='/'" aria-label="トップに戻る">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <header class="page-header">
    <span class="page-header-title">月々の支払い</span>
    <div class="page-header-auth" id="auth-area">
      <button id="login-btn" class="google-btn" style="display:none;">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        ログイン
      </button>
      <div id="user-info" class="user-info" style="display:none;">
        <img id="user-avatar" class="user-avatar" src="" alt="">
        <span id="user-name"></span>
        <button id="logout-btn" class="logout-btn">ログアウト</button>
      </div>
    </div>
  </header>

  <div id="login-screen" class="login-screen" style="display:none;">
    <div class="login-box">
      <div class="login-icon">💰</div>
      <h2>月々の支払い管理</h2>
      <p>Googleアカウントでログインして、<br>家賃・保険・サブスクなどをまとめて管理しましょう。</p>
      <button id="login-btn-main" class="google-btn large">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>

  <main id="main-content" class="main-content" style="display:none;">

    <div id="payer-filter" class="payer-filter" style="display:none;"></div>

    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-label">月額換算合計</div>
        <div class="summary-value" id="monthly-total">¥0</div>
        <div class="summary-note" id="monthly-note">全項目の月割り</div>
      </div>
      <div class="summary-card next-month-card" id="next-month-card">
        <div class="summary-label">来月の支払い</div>
        <div class="summary-value" id="next-month-total">¥0</div>
        <div class="summary-note" id="next-month-label"></div>
        <div class="forecast-hint">月別グラフ <span class="forecast-chevron">▼</span></div>
      </div>
    </div>

    <div id="forecast-panel" class="forecast-panel" style="display:none;"></div>

    <div id="chart-card" class="chart-card" style="display:none;">
      <div class="chart-header" id="chart-card-header">カテゴリ別 月額内訳</div>
      <div class="chart-body">
        <div class="chart-donut-wrap">
          <svg id="pie-chart" viewBox="0 0 200 200"></svg>
        </div>
        <div id="chart-legend" class="chart-legend"></div>
      </div>
    </div>

    <div id="personal-chart-card" class="chart-card" style="display:none;"></div>

    <div id="breakdown-card" class="breakdown-card" style="display:none;">
      <table class="breakdown-table">
        <thead>
          <tr>
            <th></th>
            <th>月額換算</th>
            <th>来月の支払い</th>
          </tr>
        </thead>
        <tbody id="breakdown-body"></tbody>
      </table>
    </div>

    <section class="section payers-section">
      <div class="section-header">
        <h2 class="section-title">支払い者の設定</h2>
        <span class="settings-note">名前を変更・追加できます</span>
      </div>
      <div class="payers-body">
        <div id="payers-list" class="payers-list"></div>
        <button type="button" id="add-payer-btn" class="add-payer-btn">+ 追加</button>
      </div>
      <div id="movein-container"></div>
      <div id="global-split-container"></div>
    </section>

    <section class="section" id="next-month-section">
      <div class="section-header">
        <h2 class="section-title">来月支払う項目</h2>
        <span id="next-month-badge" class="month-badge"></span>
      </div>
      <div id="next-month-list" class="next-month-list">
        <p class="empty-msg">来月の支払い予定はありません</p>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">項目を追加</h2>
      </div>
      <form id="add-form" class="add-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="f-name">項目名</label>
            <input type="text" id="f-name" required placeholder="例: 家賃">
          </div>
          <div class="form-group">
            <label for="f-amount">金額（円）</label>
            <input type="number" id="f-amount" required min="0" placeholder="例: 80000">
          </div>
          <div class="form-group">
            <label for="f-freq">支払い頻度</label>
            <select id="f-freq">
              <option value="1">毎月</option>
              <option value="2">2ヶ月ごと</option>
              <option value="3">3ヶ月ごと</option>
              <option value="6">半年ごと</option>
              <option value="12">年1回</option>
              <option value="24">2年ごと</option>
              <option value="36">3年ごと</option>
              <option value="custom">カスタム</option>
            </select>
          </div>
          <div class="form-group" id="add-custom-freq-group" style="display:none;">
            <label for="f-freq-custom">頻度（ヶ月）</label>
            <input type="number" id="f-freq-custom" min="1" max="120" placeholder="例: 18">
          </div>
          <div class="form-group">
            <label for="f-next-date">次回支払日</label>
            <input type="date" id="f-next-date" required>
            <div class="date-shortcuts" id="f-next-date-shortcuts"></div>
          </div>
          <div class="form-group">
            <label for="f-category">カテゴリ</label>
            <select id="f-category">
              <option value="賃貸">賃貸</option>
              <option value="インフラ">インフラ</option>
              <option value="サブスク">サブスク</option>
              <option value="保険">保険</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group" id="add-payer-override-group" style="display:none;">
            <label for="f-payer-override">誰が払う？</label>
            <select id="f-payer-override">
              <option value="">両方（設定通り）</option>
            </select>
          </div>
          <div class="form-group form-group-wide">
            <label for="f-note">メモ（任意）</label>
            <input type="text" id="f-note" placeholder="任意メモ">
          </div>
        </div>
        <button type="submit" class="add-btn">追加する</button>
      </form>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">全項目一覧</h2>
        <span id="item-count" class="item-count"></span>
      </div>
      <div id="freq-summary" class="freq-summary"></div>
      <div id="payments-list" class="payments-list">
        <p class="empty-msg">まだ項目がありません</p>
      </div>
    </section>

  </main>

  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3>項目を編集</h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <form id="edit-form" class="add-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="e-name">項目名</label>
            <input type="text" id="e-name" required>
          </div>
          <div class="form-group">
            <label for="e-amount">金額（円）</label>
            <input type="number" id="e-amount" required min="0">
          </div>
          <div class="form-group">
            <label for="e-freq">支払い頻度</label>
            <select id="e-freq">
              <option value="1">毎月</option>
              <option value="2">2ヶ月ごと</option>
              <option value="3">3ヶ月ごと</option>
              <option value="6">半年ごと</option>
              <option value="12">年1回</option>
              <option value="24">2年ごと</option>
              <option value="36">3年ごと</option>
              <option value="custom">カスタム</option>
            </select>
          </div>
          <div class="form-group" id="edit-custom-freq-group" style="display:none;">
            <label for="e-freq-custom">頻度（ヶ月）</label>
            <input type="number" id="e-freq-custom" min="1" max="120">
          </div>
          <div class="form-group">
            <label for="e-next-date">次回支払日</label>
            <input type="date" id="e-next-date" required>
            <div class="date-shortcuts" id="e-next-date-shortcuts"></div>
          </div>
          <div class="form-group">
            <label for="e-category">カテゴリ</label>
            <select id="e-category">
              <option value="賃貸">賃貸</option>
              <option value="インフラ">インフラ</option>
              <option value="サブスク">サブスク</option>
              <option value="保険">保険</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group" id="edit-payer-override-group" style="display:none;">
            <label for="e-payer-override">誰が払う？</label>
            <select id="e-payer-override">
              <option value="">両方（設定通り）</option>
            </select>
          </div>
          <div class="form-group form-group-wide">
            <label for="e-note">メモ（任意）</label>
            <input type="text" id="e-note">
          </div>
        </div>
        <div class="modal-btns">
          <button type="button" id="modal-cancel" class="cancel-btn">キャンセル</button>
          <button type="submit" class="add-btn">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script src="/common.js"></script>
</body>
</html>

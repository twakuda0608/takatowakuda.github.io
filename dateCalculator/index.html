<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="dateCalculator.css">
  <title>日付計算 | Date Calculator</title>
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <h1>日付計算</h1>
      <p class="subtitle">特定の日付からの経過日数や記念日をチェック</p>
    </header>

    <main>
      <section class="config-card">
        <label for="inputYear" class="section-label">基準日を設定</label>
        
        <div class="date-selector-group">
          <div class="inputs-row">
            <div class="input-unit">
              <input type="number" id="inputYear" min="1900" max="2099" value="2022">
              <span>年</span>
            </div>
            <div class="input-unit">
              <input type="number" id="inputMonth" min="1" max="12" value="9">
              <span>月</span>
            </div>
            <div class="input-unit">
              <input type="number" id="inputDay" min="1" max="31" value="24">
              <span>日</span>
            </div>
          </div>

          <div class="cal-anchor">
            <button type="button" id="calBtn" title="カレンダーで選択">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </button>
            <input type="date" id="hiddenDate" tabindex="-1" aria-hidden="true">
          </div>
        </div>

        <button class="main-calc-btn" onclick="calculate()">
          計算する
        </button>
      </section>

      <div id="result"></div>

      <section id="milestoneSection" hidden>
        <div class="result-card milestone-container">
          <div class="result-header">
            <h2 class="result-title">記念日リスト</h2>
            <button type="button" id="addMilestoneBtn" title="カスタム記念日を追加">＋</button>
          </div>
          
          <ul class="milestones-list" id="milestoneList">
            <li data-days="1000"></li>
            <li data-days="5000"></li>
            <li data-days="10000"></li>
            <li data-days="15000"></li>
            <li data-days="20000"></li>
          </ul>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 日付計算ツール</p>
    </footer>
  </div>

  <script src="app.js" defer></script>
  <script src="/common.js"></script>
</body>
</html>

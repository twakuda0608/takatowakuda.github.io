<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="style.css">
  <title>2進数変換器</title>
</head>
<body>
  <div class="wrap">
    <h1>2進数変換器</h1>
    <div class="page-card">

      <div class="controls">
        <fieldset>
          <legend>整数部分の桁</legend>
          <div class="control-row">
            <span>上位桁を追加 / 削除</span>
            <div class="control-buttons">
              <button class="small-button" id="addIntegerBit" aria-label="整数部分の桁を追加">＋</button>
              <button class="small-button" id="removeIntegerBit" aria-label="整数部分の桁を削除">－</button>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>小数部分の桁</legend>
          <div class="control-row">
            <span>小数桁を追加 / 削除</span>
            <div class="control-buttons">
              <button class="small-button" id="addFractionBit" aria-label="小数部分の桁を追加">＋</button>
              <button class="small-button" id="removeFractionBit" aria-label="小数部分の桁を削除">－</button>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="boxes-wrapper">
        <div class="boxes" id="boxes"></div>
      </div>

      <div class="results">
        <div class="card">
          <div>
            <div class="rank">2進数</div>
            <div class="muted">現在のビット列</div>
          </div>
          <div class="sumline" id="binaryDisplay"></div>
        </div>

        <div class="card">
          <div>
            <div class="rank">10進数</div>
          </div>
          <div class="decimal-control">
            <div class="spin-buttons">
              <button class="spin-btn" id="incrementBtn" aria-label="+1">▲</button>
              <button class="spin-btn" id="decrementBtn" aria-label="-1">▼</button>
            </div>
            <input type="text" inputmode="decimal" autocomplete="off" class="sumline" id="decimalDisplay">
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="reset-button" id="resetButton">リセット</button>
      </div>

    </div>
  </div>

  <script src="app.js" defer></script>
  <script src="/common.js"></script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>単語カード</title>
  <link rel="icon" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5XPYDMQ921"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5XPYDMQ921');
</script>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="back-fab" onclick="location.href='/'" aria-label="トップに戻る">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <header class="page-header">
    <span class="page-header-title">単語カード</span>
    <div class="page-header-auth" id="auth-area" style="display:none;">
      <img id="user-avatar" class="user-avatar" src="" alt="">
      <span id="user-name" class="user-name"></span>
      <button id="logout-btn" class="logout-btn">ログアウト</button>
    </div>
  </header>

  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-mark">Aa</div>
      <h1>単語カード</h1>
      <p>Googleアカウントでログインすると、カードをデバイス間で同期できます。</p>
      <button id="login-btn" class="google-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleログイン
      </button>
    </div>
  </div>

  <main class="app-shell" id="main-content" style="display:none;">
    <section class="deck-list-panel" id="deck-list-panel">
      <div class="deck-bar">
        <div class="deck-title-block">
          <p class="eyebrow">Decks</p>
          <h1>カード集</h1>
        </div>
        <form id="deck-form" class="deck-form">
          <input type="text" id="deck-name-input" maxlength="24" placeholder="カード集名">
          <button type="submit" class="secondary-btn deck-add-btn">カード集追加</button>
        </form>
      </div>
      <div class="deck-list" id="deck-list"></div>
    </section>

    <section class="study-panel" id="study-panel" style="display:none;">
      <div class="detail-nav">
        <button type="button" class="back-to-decks-btn" id="back-to-decks-btn">
          <span aria-hidden="true">&#8249;</span>
          カード集一覧
        </button>
      </div>

      <div class="deck-bar">
        <div class="deck-title-block">
          <p class="eyebrow">Deck</p>
          <h1 id="deck-title">単語カード</h1>
        </div>
        <div class="deck-stats" aria-label="学習状況">
          <span><strong id="card-count">0</strong>枚</span>
          <span><strong id="known-count">0</strong>暗記</span>
          <span><strong id="known-rate">0</strong>%</span>
          <span class="deck-progress" aria-hidden="true"><span id="known-rate-bar" class="deck-progress-bar"></span></span>
        </div>
      </div>

      <div class="mode-tabs" role="tablist" aria-label="表示切替">
        <button type="button" class="mode-tab active" data-mode="cards">カード</button>
        <button type="button" class="mode-tab" data-mode="list">一覧</button>
      </div>

      <section class="mode-panel active" id="cards-panel">
        <div class="study-options">
          <label>
            <span>学習方向</span>
            <select id="direction-select">
              <option value="front">表から裏</option>
              <option value="back">裏から表</option>
            </select>
          </label>
        </div>

        <div class="progress-row">
          <button type="button" class="icon-btn" id="prev-card" aria-label="前のカード">
            <span aria-hidden="true">&#8249;</span>
          </button>
          <div class="progress-text" id="progress-text">0 / 0</div>
          <button type="button" class="icon-btn" id="next-card" aria-label="次のカード">
            <span aria-hidden="true">&#8250;</span>
          </button>
        </div>

        <button type="button" class="flashcard" id="flashcard" aria-live="polite">
          <span class="card-side" id="card-side">表</span>
          <span class="card-main" id="card-main">カード未追加</span>
          <span class="card-sub" id="card-sub">クリックで裏面</span>
        </button>

        <div class="card-actions">
          <button type="button" class="secondary-btn" id="shuffle-btn">シャッフル</button>
          <button type="button" class="secondary-btn" id="reset-known-btn">暗記リセット</button>
          <button type="button" class="primary-btn" id="known-btn">暗記</button>
        </div>
      </section>

      <section class="mode-panel" id="list-panel">
        <div class="list-tools">
          <button type="button" class="primary-btn" id="edit-add-btn">編集・追加</button>
          <div class="export-tools">
            <select id="export-scope" class="export-scope" aria-label="書き出し対象">
              <option value="deck">このカード集</option>
              <option value="all">全カード集</option>
            </select>
            <button type="button" class="secondary-btn" id="export-btn">書き出し</button>
          </div>
        </div>

        <div class="edit-add-panel" id="edit-add-panel" hidden>
          <section class="add-box">
            <div class="section-header compact">
              <h2 class="section-title">カード集名</h2>
              <span class="settings-note">名前変更</span>
            </div>
            <form class="deck-rename-form" id="deck-rename-form">
              <input type="text" id="deck-rename-input" maxlength="24" placeholder="カード集名">
              <button type="submit" class="secondary-btn">名前変更</button>
            </form>
            <div class="danger-zone">
              <button type="button" class="danger-btn" id="delete-deck-btn">カード集削除</button>
            </div>
          </section>

          <div class="edit-add-grid">
            <section class="add-box">
              <div class="section-header compact">
                <h2 class="section-title">個別追加</h2>
                <span class="settings-note">表と裏</span>
              </div>
              <form class="add-form inline-add-form" id="add-form">
                <label class="field">
                  <span>表</span>
                  <input type="text" id="front-input" required placeholder="例: apple">
                </label>
                <label class="field">
                  <span>裏</span>
                  <input type="text" id="back-input" required placeholder="例: りんご">
                </label>
                <button type="submit" class="primary-btn">追加</button>
              </form>
            </section>

            <section class="add-box">
              <div class="section-header compact">
                <h2 class="section-title">ファイル追加</h2>
                <span class="settings-note">JSON / CSV</span>
              </div>
              <div class="file-import-row">
                <span class="file-import-note">`.json` `.csv` `.txt`</span>
                <label class="import-label">
                  <input type="file" id="import-file" accept=".json,.csv,.txt,application/json,text/csv,text/plain">
                  読み込み
                </label>
              </div>
            </section>
          </div>

          <section class="add-box">
            <div class="section-header compact">
              <h2 class="section-title">データ貼り付け</h2>
              <span class="settings-note">Excel / Docs</span>
            </div>
            <textarea id="bulk-input" class="import-textarea" rows="7" placeholder="Word 1&#9;Definition 1&#10;Word 2&#9;Definition 2&#10;Word 3&#9;Definition 3"></textarea>
            <div class="import-options">
              <fieldset class="import-option-group">
                <legend>単語と意味の間</legend>
                <label><input type="radio" name="term-separator" value="tab" checked> タブ</label>
                <label><input type="radio" name="term-separator" value="comma"> カンマ</label>
                <label class="custom-separator-row">
                  <input type="radio" name="term-separator" value="custom">
                  <input type="text" id="term-custom-input" class="separator-input" placeholder="カスタム">
                </label>
              </fieldset>
              <fieldset class="import-option-group">
                <legend>カードの間</legend>
                <label><input type="radio" name="card-separator" value="newline" checked> 改行</label>
                <label><input type="radio" name="card-separator" value="semicolon"> セミコロン</label>
                <label class="custom-separator-row">
                  <input type="radio" name="card-separator" value="custom">
                  <input type="text" id="card-custom-input" class="separator-input" placeholder="カスタム">
                </label>
              </fieldset>
            </div>
            <div class="import-preview">
              <div class="import-preview-head">
                <h3>プレビュー</h3>
                <span><strong id="bulk-preview-count">0</strong>枚</span>
              </div>
              <div id="bulk-preview" class="bulk-preview-empty">プレビューなし</div>
            </div>
            <label class="duplicate-skip-option">
              <input type="checkbox" id="duplicate-skip-checkbox" checked>
              重複をスキップ
            </label>
            <button type="button" class="secondary-btn bulk-add-btn" id="bulk-add-btn">一括追加</button>
          </section>
        </div>

        <div class="list-divider"></div>
        <div id="duplicate-warning" class="duplicate-warning" hidden></div>
        <div class="card-list" id="card-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
  <script src="/common.js"></script>
</body>
</html>

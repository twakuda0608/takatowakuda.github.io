<!doctype html>

<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麻雀ツール（統合版）</title>
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5XPYDMQ921"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5XPYDMQ921');
</script>
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="back-fab" onclick="location.href='/'" aria-label="トップに戻る">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <header class="page-header">
    <span class="page-header-title">麻雀ツール</span>
  </header>
  <div class="wrap">
    <div class="page-card">
    <div class="tabs">
      <button class="tabbtn" data-tab="t0">テーブル</button>
      <button class="tabbtn active" data-tab="t1">ウマ/オカ 精算</button>
      <button class="tabbtn" data-tab="t2">総合ポイント精算</button>
      <button class="tabbtn" data-tab="t3">戦績記録</button>
      <button class="tabbtn" data-tab="t4">逆転計算</button>
    </div>

    <!-- タブ0：テーブル -->
    <div id="t0" class="tab"></div>

    <!-- タブ1：ウマ/オカ 精算 -->
    <div id="t1" class="tab active">
      <div id="import-banner" style="display:none;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.4);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none;align-items:center;justify-content:space-between;gap:8px">
        <span style="font-size:13px;color:rgba(14,165,233,0.95)">📋 麻雀テーブルからスコアを取り込みました</span>
        <button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:rgba(14,165,233,0.7);font-size:16px;cursor:pointer;padding:0;line-height:1">×</button>
      </div>
      <fieldset>
        <legend>設定</legend>
        <label>初期点（例: 250）<input id="init1" type="number" value="250" /></label>
        <label>オカ（点返し、例: 300）<input id="oka1" type="number" value="300" /></label>
        <label>ウマ
          <select id="uma1">
            <option value="510">5-10（ゴットー）</option>
            <option value="1020">10-20（ワンツー）</option>
            <option value="1030" selected>10-30（ワンスリー）</option>
            <option value="2030">20-30（ツースリー）</option>
          </select>
        </label>
        <label>レート
          <select id="rate1">
            <option value="10">10（テンイチ）</option>
            <option value="20">20（テンニ）</option>
            <option value="30" selected>30（テンサン）</option>
            <option value="50">50（テンゴ）</option>
            <option value="100">100（テンピン）</option>
          </select>
        </label>
        <label class="checklabel">
          <input id="decimal1" type="checkbox" checked>
          小数点（0.1pt）まで計算する
        </label>
        <label class="checklabel">
          <input id="tie1" type="checkbox">
          同点時はウマを分け合う（例: 1位+30・2位+10 → 両者+20）
        </label>
      </fieldset>

      <fieldset>
        <legend>点数（百点単位で入力）</legend>
        <div class="score-row">
          <span class="score-row-rank">1位</span>
          <input id="sn1_1" class="player-name-input score-name" placeholder="プレイヤー1" autocomplete="off">
          <input id="s1_1" type="number" readonly class="score-num" placeholder="自動計算">
        </div>
        <div class="score-row">
          <span class="score-row-rank">2位</span>
          <input id="sn2_1" class="player-name-input score-name" placeholder="プレイヤー2" autocomplete="off">
          <input id="s2_1" type="number" value="300" class="score-num">
        </div>
        <div class="score-row">
          <span class="score-row-rank">3位</span>
          <input id="sn3_1" class="player-name-input score-name" placeholder="プレイヤー3" autocomplete="off">
          <input id="s3_1" type="number" value="200" class="score-num">
        </div>
        <div class="score-row">
          <span class="score-row-rank">4位</span>
          <input id="sn4_1" class="player-name-input score-name" placeholder="プレイヤー4" autocomplete="off">
          <input id="s4_1" type="number" value="100" class="score-num">
        </div>
      </fieldset>

      <fieldset>
        <legend>計算結果</legend>
        <div class="results">
          <div class="card"><div class="rank">1位<span id="rn1_1" class="rank-name"></span></div><div id="r1_1" class="sumline">—</div></div>
          <div class="card"><div class="rank">2位<span id="rn2_1" class="rank-name"></span></div><div id="r2_1" class="sumline">—</div></div>
          <div class="card"><div class="rank">3位<span id="rn3_1" class="rank-name"></span></div><div id="r3_1" class="sumline">—</div></div>
          <div class="card"><div class="rank">4位<span id="rn4_1" class="rank-name"></span></div><div id="r4_1" class="sumline">—</div></div>
        </div>
        <div class="footer muted">出目（pt）の合計は常に0になります。</div>
      </fieldset>

      <!-- 記録エリア -->
      <div id="record-area">
        <div id="record-needs-login" class="login-hint">
          <p class="muted">記録するには「戦績記録」タブでログインしてください。</p>
        </div>
        <div id="record-logged-in" style="display:none">
          <div class="record-actions">
            <button id="record-btn" class="record-btn">この試合を記録する</button>
            <span id="record-success" class="record-msg"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- タブ2：総合ポイント精算 -->
    <div id="t2" class="tab">
      <fieldset>
        <legend>設定</legend>
        <label>レート
          <select id="rate2">
            <option value="10">10（テンイチ）</option>
            <option value="20">20（テンニ）</option>
            <option value="30" selected>30（テンサン）</option>
            <option value="50">50（テンゴ）</option>
            <option value="100">100（テンピン）</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend>プレイヤーの総合ポイント</legend>
        <div class="grid2">
          <label>名前1 <input id="n1_2" placeholder="1" /><input id="p1_2" type="number" value="0" /></label>
          <label>名前2 <input id="n2_2" placeholder="2" /><input id="p2_2" type="number" value="0" /></label>
          <label>名前3 <input id="n3_2" placeholder="3" /><input id="p3_2" type="number" value="0" /></label>
          <label>名前4 <input id="n4_2" placeholder="4" /><input id="p4_2" type="number" value="0" /></label>
        </div>
        <div class="note">※ ポイント合計は ±0 にしてください。合計が0以外の時は結果を表示しません。</div>
      </fieldset>

      <fieldset>
        <legend>精算結果</legend>
        <ul id="resultList2"></ul>
        <div id="check2" class="note"></div>
      </fieldset>
    </div>

    <!-- タブ3：戦績記録 -->
    <div id="t3" class="tab">
      <!-- 未ログイン -->
      <div id="t3-login" class="login-wall">
        <div class="login-wall-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <p>戦績を記録・閲覧するには<br>ログインが必要です。</p>
        <button id="t3-login-btn" class="login-btn">Googleでログイン</button>
      </div>

      <!-- ログイン済み -->
      <div id="t3-content" style="display:none">
        <div class="user-bar">
          <img id="t3-avatar" class="user-avatar" src="" alt="">
          <span id="t3-name" class="user-name"></span>
          <button id="t3-logout-btn" class="logout-btn">ログアウト</button>
        </div>

        <!-- あなたの名前設定 -->
        <div class="myname-bar">
          <span class="myname-label">あなたの名前</span>
          <input id="my-name-input" class="player-name-input" placeholder="名前を登録">
          <button id="my-name-save" class="logout-btn">保存</button>
          <span id="my-name-msg" class="record-msg"></span>
        </div>

        <!-- 試合一覧 -->
        <div id="sessions-list"></div>

        <!-- 全期間集計 -->
        <div id="alltime-section" style="display:none">
          <fieldset>
            <legend>全期間集計</legend>
            <div id="alltime-table"></div>
          </fieldset>
        </div>

        <!-- プレイヤー履歴 -->
        <div id="player-history-section" style="display:none">
          <fieldset>
            <legend>プレイヤー履歴</legend>
            <div id="player-history-list"></div>
          </fieldset>
        </div>
      </div>
    </div>

    <!-- タブ4：逆転計算 -->
    <div id="t4" class="tab">
      <fieldset>
        <legend>設定</legend>
        <label>本場数
          <input id="honba4" type="number" value="0" min="0">
        </label>
        <label>供託（1本=1,000点）
          <input id="kyoutaku4" type="number" value="0" min="0">
        </label>
        <label class="checklabel">
          <input id="tie4" type="checkbox">
          同点可（同点は起家に近い方が上位）
        </label>
      </fieldset>

      <fieldset>
        <legend>自分</legend>
        <div class="opp-row">
          <span class="opp-name"></span>
          <input id="my-score4" class="opp-score score-num" type="number" value="250" min="0">
          <select id="my-role4" class="opp-role">
            <option value="ko">子</option>
            <option value="oya">親</option>
          </select>
          <span class="opp-del-placeholder"></span>
        </div>
      </fieldset>

      <fieldset>
        <legend>対戦相手</legend>
        <div id="opponents4"></div>
        <button id="add-opp4" class="logout-btn" style="margin-top:6px">＋ 相手を追加</button>
      </fieldset>

      <div id="result4"></div>
    </div>

    </div><!-- /.page-card -->
  </div>

  <script src="./app.js" type="module"></script>
  <script src="/common.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>列車位置 – 西大宮駅</title>
  <link rel="stylesheet" href="/common.css">
  <style>
    :root {
      --bg: #0b1826;
      --panel: #112240;
      --border: #1d3557;
      --text: #cde0f5;
      --muted: #4d7a9e;
      --up: #3ecf8e;
      --down: #f08060;
      --brand: #0078d7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hd-title { font-size: 1.3rem; font-weight: 700; }
    .hd-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .hd-clock { text-align: right; }
    #clock {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }
    #day-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: var(--brand);
      color: #fff;
      padding: 1px 8px;
      border-radius: 20px;
      margin-top: 2px;
    }

    /* Track */
    .track-section { padding: 32px 24px 20px; }
    .dir-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .track-wrap {
      position: relative;
      height: 100px;
    }
    .rail {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 10px;
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      transform: translateY(-50%);
    }

    /* Stations */
    .sta {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }
    .sta-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #6a94be;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1.5px var(--border);
    }
    .sta.cur .sta-dot {
      width: 22px; height: 22px;
      background: var(--brand);
      box-shadow: 0 0 0 2px #c5daf5, 0 0 14px rgba(0,120,215,0.5);
    }
    .sta-label {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .sta.cur .sta-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Trains */
    #trains-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    .train {
      position: absolute;
      top: 50%;
      width: 44px;
      height: 20px;
      transform: translate(-50%, -50%);
      z-index: 3;
    }
    .train.animated { transition: left 1s linear; }

    .t-label {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
      background: var(--bg);
      padding: 1px 3px;
      border-radius: 2px;
    }
    .t-car {
      width: 100%; height: 100%;
      border-radius: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    /* Windows */
    .t-car::before, .t-car::after {
      content: '';
      position: absolute;
      top: 4px; bottom: 4px;
      width: 7px;
      background: rgba(255,255,255,0.35);
      border-radius: 1px;
    }
    .train.up .t-car {
      background: var(--up);
      border-radius: 3px 10px 10px 3px;
    }
    .train.up .t-car::before { left: 6px; }
    .train.up .t-car::after  { left: 17px; }

    .train.down .t-car {
      background: var(--down);
      border-radius: 10px 3px 3px 10px;
    }
    .train.down .t-car::before { right: 6px; }
    .train.down .t-car::after  { right: 17px; }

    .no-train-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Legend */
    .legend {
      display: flex; gap: 16px;
      padding: 0 24px;
      font-size: 0.74rem;
      color: var(--muted);
    }
    .leg-item { display: flex; align-items: center; gap: 5px; }
    .leg-rect { width: 14px; height: 8px; border-radius: 2px; }

    /* Next trains */
    .next-section {
      margin: 20px 24px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .next-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .np-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: var(--muted);
    }
    .np-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .next-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .ni { display: flex; justify-content: space-between; align-items: center; }
    .ni-time {
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .ni-wait { font-size: 0.74rem; color: var(--muted); }
    .ni.soon .ni-wait { color: var(--up); font-weight: 600; }
    .ni.imminent .ni-time,
    .ni.imminent .ni-wait { color: #ffe066; font-weight: 700; }
    .empty-msg { font-size: 0.78rem; color: var(--muted); text-align: center; padding: 6px 0; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="hd-title">西大宮駅</div>
      <div class="hd-sub">JR川越線 列車位置情報</div>
    </div>
    <div class="hd-clock">
      <span id="clock">--:--:--</span>
      <span id="day-badge">--</span>
    </div>
  </header>

  <div class="track-section">
    <div class="dir-row">
      <span>← 川越方面</span>
      <span>大宮方面 →</span>
    </div>
    <div class="track-wrap">
      <div class="rail"></div>

      <div class="sta" style="left:13%">
        <div class="sta-dot"></div>
        <div class="sta-label">指扇</div>
      </div>
      <div class="sta cur" style="left:50%">
        <div class="sta-dot"></div>
        <div class="sta-label">西大宮</div>
      </div>
      <div class="sta" style="left:87%">
        <div class="sta-dot"></div>
        <div class="sta-label">日進</div>
      </div>

      <div id="trains-layer"></div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item">
      <div class="leg-rect" style="background:var(--up)"></div>
      上り（大宮方面）
    </div>
    <div class="leg-item">
      <div class="leg-rect" style="background:var(--down)"></div>
      下り（川越方面）
    </div>
  </div>

  <div class="next-section">
    <div class="next-panel">
      <div class="np-title">
        <div class="np-dot" style="background:var(--up)"></div>
        次の上り
      </div>
      <ul class="next-list" id="next-up"></ul>
    </div>
    <div class="next-panel">
      <div class="np-title">
        <div class="np-dot" style="background:var(--down)"></div>
        次の下り
      </div>
      <ul class="next-list" id="next-down"></ul>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    const T = (h, m) => h * 60 + m;

    function makeRange(hStart, hEnd, mins) {
      const arr = [];
      for (let h = hStart; h <= hEnd; h++)
        for (const m of mins) arr.push(T(h, m));
      return arr;
    }

    // Weekend up: hours 9-22 alternate between :12,:36 (odd) and :00,:24,:48 (even)
    function weekendUpCore() {
      const arr = [];
      for (let h = 9; h <= 22; h++) {
        if (h % 2 === 1) arr.push(T(h, 12), T(h, 36));
        else             arr.push(T(h, 0),  T(h, 24), T(h, 48));
      }
      return arr;
    }

    const timetable = {
      weekday: {
        up: [
          T(4,51),
          T(5,2),  T(5,11), T(5,19), T(5,28), T(5,36), T(5,49), T(5,59),
          T(6,8),  T(6,17), T(6,27), T(6,36), T(6,45), T(6,54),
          T(7,3),  T(7,12), T(7,21), T(7,30), T(7,39), T(7,48), T(7,57),
          T(8,6),  T(8,15), T(8,24), T(8,33), T(8,42), T(8,51),
          ...makeRange(9, 22, [0, 12, 24, 36, 48]),
          T(23,5), T(23,18), T(23,32), T(23,47)
        ],
        down: [
          T(5,44),
          T(6,11), T(6,33), T(6,57),
          ...makeRange(7, 22, [13, 28, 43, 58]),
          T(23,13), T(23,35), T(23,56)
        ]
      },
      weekend: {
        up: [
          T(4,51),
          T(5,11), T(5,28), T(5,49),
          T(6,8),  T(6,27), T(6,45),
          T(7,3),  T(7,21), T(7,39), T(7,57),
          T(8,15), T(8,33), T(8,51),
          ...weekendUpCore(),
          T(23,18), T(23,47)
        ],
        down: [
          T(5,44),
          T(6,33),
          ...makeRange(7, 22, [13, 43]),
          T(23,35)
        ]
      }
    };

    function getSched() {
      const d = new Date().getDay();
      return (d === 0 || d === 6) ? timetable.weekend : timetable.weekday;
    }

    function getNow() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;
    }

    function fmt(mins) {
      const h = Math.floor(mins / 60) % 24;
      const m = Math.floor(mins % 60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    // 画面上の駅位置 (%)
    const L = 13, C = 50, R = 87;
    // 駅間所要時間 (分) — scrape.py で取得した値
    // 上り: 指扇→西大宮 2分, 西大宮→日進 3分
    // 下り: 日進→西大宮 3分, 西大宮→指扇 2分
    const DT = {
      up:   { before: 2, after: 3 },
      down: { before: 3, after: 2 },
    };

    function getOnTrack(sched, now) {
      const out = [];

      // 上り: 指扇(T-2) → 西大宮(T) → 日進(T+3)
      for (const t of sched.up) {
        const diff = now - t;
        const { before, after } = DT.up;
        if (diff < -before || diff > after) continue;
        // 区間ごとに異なる速度を区分線形補間で表現
        const pos = diff <= 0
          ? L + (diff + before) / before * (C - L)
          : C + diff / after * (R - C);
        out.push({ id: `u${t}`, dir: 'up', pos, t });
      }

      // 下り: 日進(T-3) → 西大宮(T) → 指扇(T+2)
      for (const t of sched.down) {
        const diff = now - t;
        const { before, after } = DT.down;
        if (diff < -before || diff > after) continue;
        const pos = diff <= 0
          ? R + (diff + before) / before * (C - R)
          : C + diff / after * (L - C);
        out.push({ id: `d${t}`, dir: 'down', pos, t });
      }

      return out;
    }

    function getNext(sched, now, n = 4) {
      return {
        up:   sched.up.filter(t => t > now).slice(0, n),
        down: sched.down.filter(t => t > now).slice(0, n)
      };
    }

    const trainEls = new Map();

    function renderTrains(trains) {
      const layer = document.getElementById('trains-layer');
      const seen = new Set();

      for (const tr of trains) {
        seen.add(tr.id);
        if (!trainEls.has(tr.id)) {
          const el = document.createElement('div');
          el.className = `train ${tr.dir}`;
          el.style.left = `${tr.pos}%`;
          el.innerHTML = `<div class="t-label">${fmt(tr.t)}</div><div class="t-car"></div>`;
          layer.appendChild(el);
          trainEls.set(tr.id, el);
          // Enable smooth transition after initial placement is rendered
          requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('animated')));
        } else {
          trainEls.get(tr.id).style.left = `${tr.pos}%`;
        }
      }

      for (const [id, el] of trainEls) {
        if (!seen.has(id)) { el.remove(); trainEls.delete(id); }
      }

      let noMsg = layer.querySelector('.no-train-msg');
      if (trains.length === 0) {
        if (!noMsg) {
          noMsg = document.createElement('div');
          noMsg.className = 'no-train-msg';
          noMsg.textContent = 'この区間を走行中の列車はありません';
          layer.appendChild(noMsg);
        }
      } else {
        noMsg?.remove();
      }
    }

    function renderNext(next, now) {
      for (const dir of ['up', 'down']) {
        const ul = document.getElementById(`next-${dir}`);
        ul.innerHTML = '';
        if (next[dir].length === 0) {
          ul.innerHTML = '<li class="empty-msg">本日の最終列車が終了しました</li>';
          continue;
        }
        for (const t of next[dir]) {
          const wait = t - now;
          const li = document.createElement('li');
          li.className = `ni${wait < 1 ? ' imminent' : wait < 5 ? ' soon' : ''}`;
          const waitStr = wait < 1   ? 'まもなく発車'
                        : wait < 60  ? `あと ${Math.round(wait)} 分`
                        : `あと ${Math.floor(wait / 60)}h${Math.round(wait % 60)}m`;
          li.innerHTML = `<span class="ni-time">${fmt(t)}</span><span class="ni-wait">${waitStr}</span>`;
          ul.appendChild(li);
        }
      }
    }

    function tick() {
      const now  = getNow();
      const sched = getSched();
      const d    = new Date();

      // Clock
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
      const day = d.getDay();
      document.getElementById('day-badge').textContent = (day === 0 || day === 6) ? '土休日' : '平日';

      renderTrains(getOnTrack(sched, now));
      renderNext(getNext(sched, now), now);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

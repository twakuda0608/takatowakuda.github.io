<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>列車位置 – 西大宮駅</title>
  <link rel="stylesheet" href="/common.css">
  <style>
    :root {
      --up: #16a34a;
      --down: #dc4a22;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top left, #ffffff, #e2e8f0);
      color: #1a202c;
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 20px 48px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .hd-title { font-size: 2.2rem; font-weight: 700; color: var(--brand); letter-spacing: 0.02em; }
    .hd-sub { font-size: 1rem; color: var(--muted-color); margin-top: 4px; }
    .hd-clock { text-align: right; }
    #clock {
      display: block;
      font-size: 3.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: #1a202c;
    }
    #day-badge {
      display: inline-block;
      font-size: 1rem;
      background: var(--brand);
      color: #fff;
      padding: 3px 14px;
      border-radius: 20px;
      margin-top: 4px;
    }

    /* Track */
    .track-section { padding: 40px 60px 24px; flex-shrink: 0; }
    .dir-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      color: var(--muted-color);
      margin-bottom: 16px;
    }
    .track-wrap {
      position: relative;
      height: 260px;
    }
    .rail {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 18px;
      background: #e2e8f0;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      transform: translateY(-50%);
    }

    /* Stations */
    .sta {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }
    .sta-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #94a3b8;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #cbd5e1;
    }
    .sta.cur .sta-dot {
      width: 48px; height: 48px;
      background: var(--brand);
      box-shadow: 0 0 0 3px #bfdbfe, 0 0 24px rgba(0,120,215,0.35);
    }
    .sta-label {
      margin-top: 20px;
      font-size: 1.5rem;
      color: var(--muted-color);
      white-space: nowrap;
    }
    .sta.cur .sta-label {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a202c;
    }

    /* Trains */
    #trains-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    .train {
      position: absolute;
      top: 50%;
      width: 110px;
      height: 50px;
      transform: translate(-50%, -50%);
      z-index: 3;
    }
    .train.animated { transition: left 1s linear; }

    .t-label {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      color: var(--muted-color);
      white-space: nowrap;
      background: rgba(255,255,255,0.9);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .t-car {
      width: 100%; height: 100%;
      border-radius: 5px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
      /* JR埼京線: 白車体 + 深緑ライン */
      background: linear-gradient(
        to bottom,
        #f2f2f2 0%,
        #f2f2f2 46%,
        #1a6b3a 46%,
        #1a6b3a 82%,
        #f2f2f2 82%,
        #f2f2f2 100%
      );
    }
    /* Windows — white section above the green stripe */
    .t-car::before, .t-car::after {
      content: '';
      position: absolute;
      top: 5px;
      height: 10px;
      width: 14px;
      background: #a0d4f0;
      border-radius: 2px;
    }
    .train.up .t-car {
      border-radius: 5px 22px 22px 5px;
    }
    .train.up .t-car::before { left: 14px; }
    .train.up .t-car::after  { left: 34px; }

    .train.down .t-car {
      border-radius: 22px 5px 5px 22px;
    }
    .train.down .t-car::before { right: 14px; }
    .train.down .t-car::after  { right: 34px; }

    /* Legend */
    .legend {
      display: flex; gap: 24px;
      padding: 0 60px;
      font-size: 1rem;
      color: var(--muted-color);
      flex-shrink: 0;
    }
    .leg-item { display: flex; align-items: center; gap: 8px; }
    .leg-rect { width: 28px; height: 14px; border-radius: 3px; }

    /* Next trains */
    .next-section {
      margin: 24px 60px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }
    .next-panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 40px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .np-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 24px;
      color: var(--muted-color);
    }
    .np-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .next-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
    .ni { display: flex; justify-content: space-between; align-items: center; }
    .ni-time {
      font-size: 2.4rem;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: #1a202c;
    }
    .ni-wait { font-size: 1.3rem; color: var(--muted-color); }
    .ni.soon .ni-wait { color: var(--up); font-weight: 600; }
    .ni.imminent .ni-time { color: var(--brand); font-weight: 700; }
    .ni.imminent .ni-wait { color: var(--brand); font-weight: 700; }
    .empty-msg { font-size: 1rem; color: var(--muted-color); text-align: center; padding: 10px 0; }

    /* Hover tooltip */
    .t-tooltip {
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #fff;
      background: rgba(30, 41, 59, 0.88);
      padding: 4px 10px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .train:hover .t-tooltip { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="hd-title">西大宮駅</div>
      <div class="hd-sub">JR川越線 列車位置情報</div>
    </div>
    <div class="hd-clock">
      <span id="clock">--:--:--</span>
      <span id="day-badge">--</span>
    </div>
  </header>

  <div class="track-section">
    <div class="dir-row">
      <span>← 川越方面</span>
      <span>大宮方面 →</span>
    </div>
    <div class="track-wrap">
      <div class="rail"></div>

      <div class="sta" style="left:13%">
        <div class="sta-dot"></div>
        <div class="sta-label">指扇</div>
      </div>
      <div class="sta cur" style="left:50%">
        <div class="sta-dot"></div>
        <div class="sta-label">西大宮</div>
      </div>
      <div class="sta" style="left:87%">
        <div class="sta-dot"></div>
        <div class="sta-label">日進</div>
      </div>

      <div id="trains-layer"></div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item">
      <div class="leg-rect" style="background:var(--up)"></div>
      上り（大宮方面）
    </div>
    <div class="leg-item">
      <div class="leg-rect" style="background:var(--down)"></div>
      下り（川越方面）
    </div>
  </div>

  <div class="next-section">
    <div class="next-panel">
      <div class="np-title">
        <div class="np-dot" style="background:var(--up)"></div>
        次の上り
      </div>
      <ul class="next-list" id="next-up"></ul>
    </div>
    <div class="next-panel">
      <div class="np-title">
        <div class="np-dot" style="background:var(--down)"></div>
        次の下り
      </div>
      <ul class="next-list" id="next-down"></ul>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    // 画面上の駅位置 (%)
    const L = 13, C = 50, R = 87;

    let scheduleData = null;

    function getSched() {
      if (!scheduleData) return null;
      const d = new Date().getDay();
      return (d === 0 || d === 6) ? scheduleData.timetable.weekend : scheduleData.timetable.weekday;
    }

    function getNow() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;
    }

    function fmt(mins) {
      const h = Math.floor(mins / 60) % 24;
      const m = Math.floor(mins % 60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    function getOnTrack(sched, now) {
      const out = [];

      // 上り: 指扇(dep_before) → 西大宮(arr/dep_nishiomiya) → 日進(arr_after)
      for (const tr of sched.up) {
        if (now < tr.dep_before || now > tr.arr_after) continue;
        let pos;
        if (now <= tr.arr_nishiomiya) {
          const span = tr.arr_nishiomiya - tr.dep_before;
          pos = span > 0 ? L + (now - tr.dep_before) / span * (C - L) : C;
        } else if (now <= tr.dep_nishiomiya) {
          pos = C;
        } else {
          const span = tr.arr_after - tr.dep_nishiomiya;
          pos = span > 0 ? C + (now - tr.dep_nishiomiya) / span * (R - C) : R;
        }
        out.push({ id: `u${tr.arr_nishiomiya}`, dir: 'up', pos, t: tr.dep_nishiomiya, arr: tr.arr_nishiomiya });
      }

      // 下り: 日進(dep_before) → 西大宮(arr/dep_nishiomiya) → 指扇(arr_after)
      for (const tr of sched.down) {
        if (now < tr.dep_before || now > tr.arr_after) continue;
        let pos;
        if (now <= tr.arr_nishiomiya) {
          const span = tr.arr_nishiomiya - tr.dep_before;
          pos = span > 0 ? R + (now - tr.dep_before) / span * (C - R) : C;
        } else if (now <= tr.dep_nishiomiya) {
          pos = C;
        } else {
          const span = tr.arr_after - tr.dep_nishiomiya;
          pos = span > 0 ? C + (now - tr.dep_nishiomiya) / span * (L - C) : L;
        }
        out.push({ id: `d${tr.arr_nishiomiya}`, dir: 'down', pos, t: tr.dep_nishiomiya, arr: tr.arr_nishiomiya });
      }

      return out;
    }

    function getNext(sched, now, n = 4) {
      return {
        up:   sched.up.filter(tr => tr.dep_nishiomiya > now).slice(0, n),
        down: sched.down.filter(tr => tr.dep_nishiomiya > now).slice(0, n)
      };
    }

    const trainEls = new Map();

    function renderTrains(trains) {
      const layer = document.getElementById('trains-layer');
      const seen = new Set();

      for (const tr of trains) {
        seen.add(tr.id);
        if (!trainEls.has(tr.id)) {
          const el = document.createElement('div');
          el.className = `train ${tr.dir}`;
          el.style.left = `${tr.pos}%`;
          el.innerHTML = `<div class="t-label">${fmt(tr.t)}</div><div class="t-car"></div><div class="t-tooltip">西大宮着 ${fmt(tr.arr)}</div>`;
          layer.appendChild(el);
          trainEls.set(tr.id, el);
          requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('animated')));
        } else {
          trainEls.get(tr.id).style.left = `${tr.pos}%`;
        }
      }

      for (const [id, el] of trainEls) {
        if (!seen.has(id)) { el.remove(); trainEls.delete(id); }
      }

    }

    function renderNext(next, now) {
      for (const dir of ['up', 'down']) {
        const ul = document.getElementById(`next-${dir}`);
        ul.innerHTML = '';
        if (next[dir].length === 0) {
          ul.innerHTML = '<li class="empty-msg">本日の最終列車が終了しました</li>';
          continue;
        }
        for (const tr of next[dir]) {
          const wait = tr.dep_nishiomiya - now;
          const li = document.createElement('li');
          li.className = `ni${wait < 1 ? ' imminent' : wait < 5 ? ' soon' : ''}`;
          const waitStr = wait < 1   ? 'まもなく発車'
                        : wait < 60  ? `あと ${Math.round(wait)} 分`
                        : `あと ${Math.floor(wait / 60)}h${Math.round(wait % 60)}m`;
          li.innerHTML = `<span class="ni-time">${fmt(tr.dep_nishiomiya)}</span><span class="ni-wait">${waitStr}</span>`;
          ul.appendChild(li);
        }
      }
    }

    function tick() {
      const sched = getSched();
      const d = new Date();
      const now = d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;

      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
      const day = d.getDay();
      document.getElementById('day-badge').textContent = (day === 0 || day === 6) ? '土休日' : '平日';

      if (!sched) return;
      // After midnight (00:00–01:59), shift now into the post-midnight range so
      // trains stored as 1440+ minutes are found correctly.
      const schedNow = now < 120 ? now + 1440 : now;
      renderTrains(getOnTrack(sched, schedNow));
      renderNext(getNext(sched, schedNow), schedNow);
    }

    fetch('/train/timetable.json')
      .then(r => r.json())
      .then(data => { scheduleData = data; tick(); })
      .catch(() => {
        document.getElementById('trains-layer').innerHTML =
          '<div class="no-train-msg">時刻表の読み込みに失敗しました</div>';
      });

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
